services:
  api:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./apps/api:/app
      - api-data:/data
    command: >
      sh -c "pip install -e . &&
      uvicorn eml_craft.main:app --host 0.0.0.0 --port 8000"
    environment:
      EML_CRAFT_DB: /data/eml-craft.sqlite3
    ports:
      - "8000:8000"

  web:
    image: node:22-slim
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "npm install && npm run dev -w apps/web -- --host 0.0.0.0"
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8000
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  api-data:

